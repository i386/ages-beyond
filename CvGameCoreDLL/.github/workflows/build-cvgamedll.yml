name: Build CvGameCoreDLL

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-vc71:
    name: VC7.1 Win32 DLL
    runs-on: windows-2022

    defaults:
      run:
        shell: cmd

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Restore VC7.1 source archive cache
        id: restore-vc71-downloads
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}\vc71-downloads
          key: vc71-downloads-${{ runner.os }}-vs2003-sdk-v1
          restore-keys: |
            vc71-downloads-${{ runner.os }}-

      - name: Download VC7.1 source archives
        if: steps.restore-vc71-downloads.outputs.cache-hit != 'true'
        env:
          VC71_TOOLCHAIN_URL: ${{ secrets.VC71_TOOLCHAIN_URL }}
          VS2003_ISO_URL: ${{ vars.VS2003_ISO_URL }}
          VCTOOLKIT2003_URL: ${{ vars.VCTOOLKIT2003_URL }}
          PLATFORM_SDK_URL: ${{ vars.PLATFORM_SDK_URL }}
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\prepare_vc71_toolchain.ps1 -OutputDir "%RUNNER_TEMP%\vc71" -DownloadCacheDir "%RUNNER_TEMP%\vc71-downloads" -DownloadOnly

      - name: Save VC7.1 source archive cache
        if: steps.restore-vc71-downloads.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}\vc71-downloads
          key: vc71-downloads-${{ runner.os }}-vs2003-sdk-v1

      - name: Restore prepared VC7.1 toolchain cache
        id: restore-vc71-toolchain
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}\vc71
          key: vc71-toolchain-${{ runner.os }}-${{ hashFiles('scripts/prepare_vc71_toolchain.ps1') }}-v1
          restore-keys: |
            vc71-toolchain-${{ runner.os }}-

      - name: Prepare VC7.1 toolchain
        if: steps.restore-vc71-toolchain.outputs.cache-hit != 'true'
        env:
          VC71_TOOLCHAIN_URL: ${{ secrets.VC71_TOOLCHAIN_URL }}
          VS2003_ISO_URL: ${{ vars.VS2003_ISO_URL }}
          VCTOOLKIT2003_URL: ${{ vars.VCTOOLKIT2003_URL }}
          PLATFORM_SDK_URL: ${{ vars.PLATFORM_SDK_URL }}
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\prepare_vc71_toolchain.ps1 -OutputDir "%RUNNER_TEMP%\vc71" -DownloadCacheDir "%RUNNER_TEMP%\vc71-downloads"

      - name: Save prepared VC7.1 toolchain cache
        if: steps.restore-vc71-toolchain.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}\vc71
          key: vc71-toolchain-${{ runner.os }}-${{ hashFiles('scripts/prepare_vc71_toolchain.ps1') }}-v1

      - name: Build Final Release
        run: scripts\build_vc71_nmake.bat "%RUNNER_TEMP%\vc71"

      - name: Upload CvGameCoreDLL
        uses: actions/upload-artifact@v7
        with:
          name: CvGameCoreDLL-win32
          path: artifacts/CvGameCoreDLL.dll
          if-no-files-found: error
