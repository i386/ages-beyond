name: Build Ages Beyond

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  build-mod:
    name: Build bridge DLL, companion, and mod zip
    runs-on: windows-2022

    defaults:
      run:
        shell: cmd

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Download main CvGameCoreDLL build
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $runId = gh run list --repo i386/CvGameCoreDLL --branch main --workflow "Build CvGameCoreDLL" --status success --limit 1 --json databaseId --jq '.[0].databaseId'
          if (-not $runId) {
              throw "No successful main-branch CvGameCoreDLL build found."
          }

          Write-Host "Downloading CvGameCoreDLL-win32 from i386/CvGameCoreDLL run $runId"
          gh run download $runId --repo i386/CvGameCoreDLL --name CvGameCoreDLL-win32 --dir CvGameCoreDLL-build
          if (-not (Test-Path "CvGameCoreDLL-build\CvGameCoreDLL.dll")) {
              throw "Downloaded CvGameCoreDLL artifact did not contain CvGameCoreDLL.dll"
          }

      - name: Build mod companion
        run: cargo build --release --package ages-beyond-companion

      - name: Package mod zip
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\package_mod.ps1 -DllPath CvGameCoreDLL-build\CvGameCoreDLL.dll

      - name: Upload packaged mod
        uses: actions/upload-artifact@v7
        with:
          name: Civilization-IV-Ages-Beyond
          path: dist\stage\*
          if-no-files-found: error

      - name: Upload CvGameCoreDLL
        uses: actions/upload-artifact@v7
        with:
          name: CvGameCoreDLL-win32
          path: |
            CvGameCoreDLL-build\CvGameCoreDLL.dll
            CvGameCoreDLL-build\CvGameCoreDLL.map
          if-no-files-found: error
